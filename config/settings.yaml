# ─── Assets universe ──────────────────────────────────────────────────────────
assets:
  commodities: []   # Gold removed
  equities:
    - QQQ      # Nasdaq-100 ETF
    - SPY      # S&P 500 ETF
    - NQ=F     # Nasdaq-100 futures (E-mini)

# ─── Scanner ──────────────────────────────────────────────────────────────────
scanner:
  enabled: false

# ─── Interactive Brokers (Path A) ─────────────────────────────────────────────
ib:
  enabled: false
  host: "127.0.0.1"
  port: 4002
  client_id: 1
  account: ""
  market_data_type: 1
  use_for_data: true
  use_for_orders: true
  readonly: false

# ─── Risk profile ─────────────────────────────────────────────────────────────
risk:
  min_sharpe: 0.5
  confidence_threshold: 0.68
  max_drawdown_pct: 10.0

  max_spread_pct: 0.005
  min_avg_volume: 0
  min_liquidity_score: 0.10
  min_rvol: 0.5

  max_fake_breakout_prob: 0.65
  max_volatility_percentile: 0.98

  atr_stop_multiplier: 2.0
  max_position_pct: 0.01
  max_loss_per_trade_pct: 0.005

  max_daily_drawdown_pct: 3.0
  max_signals_per_day: 6        # 3 per strategy × 2 (QQQ + SPY)
  max_signals_per_hour: 2

# ─── Timeframes ───────────────────────────────────────────────────────────────
timeframes:
  day_trading: "1h"
  trend: "4h"
  daily: "1d"

# ─── ML models ────────────────────────────────────────────────────────────────
ml:
  lookback_window: 60
  lstm_units: [64, 32]
  dropout: 0.4
  epochs: 25
  batch_size: 32
  retrain_interval_hours: 24
  label_threshold: 0.005
  label_horizon: 5

# ─── Quantum optimizer ────────────────────────────────────────────────────────
quantum:
  reps: 3
  shots: 1024
  backend: "aer_simulator"
  max_features_selected: 10

# ─── Gemini NLP analyzer ──────────────────────────────────────────────────────
gemini:
  enabled: true
  model: "gemini-2.0-flash"
  cache_minutes: 30
  max_texts_per_ticker: 12

# ─── Signal fusion weights (overridden by QAOA at runtime) ───────────────────
signal_weights:
  technical: 0.25
  ml_prediction: 0.25
  statistical: 0.15
  fundamental: 0.05
  ensemble: 0.05
  nlp: 0.25

# ─── Backtesting ──────────────────────────────────────────────────────────────
backtest:
  start_date: "2019-01-01"
  end_date: "2024-12-31"
  initial_capital: 9000
  commission_pct: 0.001
  slippage_pct: 0.0008
  walk_forward_splits: 5

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  level: INFO
  rotation: "1 day"
  retention: "30 days"

# ─── Two-Strategy Configuration ───────────────────────────────────────────────
# Each strategy: independent capital 8 871, 1% risk per trade (88.71), R:R 1:2.
# Max 3 trades/day per strategy (6 total).

strategies:

  # ── Strategy 1 : Day Trading Gold (GC=F) ───────────────────────────────────
  gold:
    enabled: false  # Gold removed
    capital: 8871.0
    risk_pct: 0.0113          # 1.13% = ~100€ risk per trade (SL hit = -100€)
    rr_ratio: 2.0             # TP = 2×SL = +200€ per win
    max_trades_day: 3
    timeframes:
      trend: "4h"
      execution: "1h"         # 1H — 15m gives only 5 signals/60d. 1H has 2yr backtest data.
    vp_bars_4h: 20
    min_confluence: 6         # daily proxy: conf=6 WR=71% avg=+52€ vs conf=5 WR=33% avg=-4€
    atr_sl_mult: 1.5
    vwap_tol: 0.001           # 0.1% band around VWAP
    ticker: "GC=F"
    use_dxy: true             # DXY required — filters out SELL in Gold bull trend (10yr proxy: Sharpe +1.025 with DXY vs -4.0 without)
    require_dxy: true         # DXY bearish = BUY only. Removes SELL Gold (WR=0% over 10yr)
    blocked_setups:           # poc_rejection confirmed losing (PF=0.23 precision, 0.53 daily)
      - "poc_rejection"
    sessions_utc:
      ny: [13, 20]            # Full NY session (13h–20h UTC): more signals + positions run to natural end

  # ── Strategy 2 : Day Trading Nasdaq (QQQ) ──────────────────────────────────
  nasdaq:
    enabled: false   # BUY WR=20% avec Alpaca IEX — aucun edge réel
    capital: 4435.0
    risk_pct: 0.05            # 5% = ~221€ risk/trade · TP ~553€ · WARNING: 5 consec losses = -25% capital
    rr_ratio: 2.5             # 2.5 validated: Sharpe 2.53, PF 1.40, Ann 48% (precision 0.2y)
    max_trades_day: 3
    timeframes:
      trend: "4h"
      execution: "15m"        # 15m bars — 4x more signals/session, tighter SL/TP (ATR smaller)
    vp_bars_4h: 20
    min_confluence: 5         # conf=4 avg=+2.62$ PF=1.04 — no edge. conf=5 avg=+188$ WR=100%
    atr_sl_mult: 1.5
    vwap_tol: 0.001
    ticker: "QQQ"
    leverage: 2.0             # 2x leverage — multiplies dollar_per_point in backtest/live
    require_dxy: false        # No DXY filter for equity
    blocked_setups: []        # poc_rejection block was based on Gold data — not applicable to QQQ
    sessions_utc:
      ny: [14, 20]            # NYSE 09:30–16:00 ET ≈ 13:30–20:00 UTC (EDT)

  # ── Strategy 3 : Day Trading S&P 500 ETF (SPY) ─────────────────────────────
  spy:
    enabled: true
    capital: 4435.0
    risk_pct: 0.05            # 5% = ~221€ risk/trade · TP ~553€ · WARNING: 5 consec losses = -25% capital
    rr_ratio: 2.5             # 2.5 validated: Sharpe 1.94, PF 1.29, Ann 27% (precision 0.2y)
    max_trades_day: 3
    timeframes:
      trend: "4h"
      execution: "15m"        # 15m bars — 4x more signals/session, tighter SL/TP (ATR smaller)
    vp_bars_4h: 20
    min_confluence: 5         # align with QQQ — conf=5 WR=50%+ PF=1.65 vs conf=4 PF=1.05
    atr_sl_mult: 1.5
    vwap_tol: 0.001
    ticker: "SPY"
    leverage: 2.0             # 2x leverage — multiplies dollar_per_point in backtest/live
    use_dxy: false
    require_dxy: false
    blocked_setups:
      - "poc_rejection"       # poc_rejection SPY precision: WR=44% PF=0.83. vwap_pullback: WR=56% PF=1.18.
    blocked_directions:
      - "SELL"                # SELL SPY 2x: WR=25% PF=0.51 avg=-165€ — destructeur avec levier
    sessions_utc:
      ny: [14, 20]

  # ── Strategy 4 : Day Trading Nasdaq Futures (NQ=F) ─────────────────────────
  nq:
    enabled: false
    capital: 2957.0
    risk_pct: 0.05            # 5% = ~221€ risk/trade · align with QQQ/SPY
    rr_ratio: 2.5             # 2.5 validated: Sharpe 6.83, PF 2.94, WR 71% (precision 2y)
    max_trades_day: 3
    timeframes:
      trend: "4h"
      execution: "1h"         # 1H — 15m gives only 4 signals in 60d. SELL bias needs hourly structure.
    vp_bars_4h: 20
    min_confluence: 5         # conf=5 WR=71% PF=2.94 vs conf=4 WR=58% PF=1.64
    atr_sl_mult: 1.5
    vwap_tol: 0.001
    ticker: "NQ=F"
    use_dxy: false
    require_dxy: false
    blocked_setups:
      - "vwap_pullback"       # WR=43% PF=0.74 on NQ — terrible. Only poc_rejection.
    blocked_directions:
      - "BUY"                 # BUY NQ=F: WR=43% PF=0.62. SELL: WR=62% PF=1.77 — only SHORT.
    sessions_utc:
      ny: [14, 20]            # Mirror NYSE hours (NQ futures trade 23/5 but signals only NY)
